{% extends "core/base.html" %}

{% block title %}Connexion{% endblock %}

{% block content %}
<style>
  body{
    position: relative;
    background-image: url("https://storage.googleapis.com/dojo360-public/cdea/gestom/camions_1800.jpg");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
  }
  body::before{
    content: "";
    position: fixed;
    inset: 0;
    background: rgba(255, 255, 255, 0.8);
    pointer-events: none;
    z-index: 0;
  }
  .main{
    position: relative;
    z-index: 1;
  }
</style>

<section class="card card__pad" style="max-width: 480px; margin: 40px auto; background:#ffffff;">
  <header class="header" style="margin-bottom: 8px;">
    <div>
      <h1 class="h2">Connexion</h1>
      <p class="sub">Connectez-vous pour acceder a l'application.</p>
    </div>
  </header>

  <form method="post" class="form">
    {% csrf_token %}

    {% if form.non_field_errors %}
      <div class="sub" style="color:#991b1b;">{{ form.non_field_errors }}</div>
    {% endif %}

    <div>
      <label for="id_username">Nom d'utilisateur</label>
      <input id="id_username" type="text" name="username" class="input" autofocus required />
    </div>

    <div>
      <label for="id_password">Mot de passe</label>
      <input id="id_password" type="password" name="password" class="input" required />
    </div>

    {% if next %}
      <input type="hidden" name="next" value="{{ next }}" />
    {% endif %}

    <button type="submit" class="btn btn--primary">Se connecter</button>
  </form>
</section>
{% endblock %}
