{% extends "core/base.html" %}

{% block title %}Energies{% endblock %}

{% block content %}
<div class="card">
  <div class="card__pad">
    <div class="header">
      <div>
        <h1 class="h1">Energies</h1>
      </div>
    </div>

    <div class="table-wrap">
      <table class="table">
        <thead>
          <tr>
            <th>Energie</th>
            <th class="right">Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>
              <input
                type="text"
                name="energie"
                form="create-energie-form"
                maxlength="150"
                required
              >
            </td>
            <td class="right">
              <div class="actions">
                <form id="create-energie-form" method="post" action="{% url 'core:energie_create' %}">
                  {% csrf_token %}
                  <button class="btn btn--sm btn--primary" type="submit">Ajouter</button>
                </form>
              </div>
            </td>
          </tr>

          {% for e in object_list %}
          <tr>
            <td>
              <input
                type="text"
                name="energie"
                value="{{ e.energie|default_if_none:'' }}"
                form="update-energie-{{ e.pk }}"
                maxlength="150"
                required
              >
            </td>
            <td class="right">
              <div class="actions">
                <form id="update-energie-{{ e.pk }}" method="post" action="{% url 'core:energie_update' e.pk %}">
                  {% csrf_token %}
                  <button class="btn btn--sm btn--ghost" type="submit" title="Modifier" aria-label="Modifier">💾</button>
                </form>
                <a href="{% url 'core:energie_detail' e.pk %}" class="btn btn--sm btn--ghost">Voir</a>
                <form method="post" action="{% url 'core:energie_delete' e.pk %}" onsubmit="return confirm('Supprimer cette energie ?');">
                  {% csrf_token %}
                  <button class="btn btn--sm btn--danger" type="submit" title="Supprimer" aria-label="Supprimer">🗑️</button>
                </form>
              </div>
            </td>
          </tr>
          {% empty %}
          <tr>
            <td colspan="2" class="sub">Aucune energie enregistree</td>
          </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  </div>
</div>
{% endblock %}
